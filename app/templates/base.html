<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Klantenservice Assistent{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>AI Klantenservice Assistent</h1>
            <nav>
                <a href="/dashboard">Dashboard</a>
                <a href="/dashboard/pending">Te Beoordelen</a>
                <a href="/dashboard/resolved">Opgelost</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 AI Klantenservice Assistent</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
