<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a73e8">System Architecture - AI Klantenservice Assistent</text>

  <!-- Customer -->
  <rect x="30" y="180" width="140" height="80" rx="10" fill="#e3f2fd" stroke="#1a73e8" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">Klant</text>
  <text x="100" y="240" text-anchor="middle" font-size="11" fill="#666">E-mail / Bericht</text>

  <!-- API Gateway -->
  <rect x="230" y="160" width="150" height="120" rx="10" fill="#fff" stroke="#1a73e8" stroke-width="2" filter="url(#shadow)"/>
  <text x="305" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">FastAPI</text>
  <text x="305" y="215" text-anchor="middle" font-size="11" fill="#666">REST API</text>
  <text x="305" y="240" text-anchor="middle" font-size="10" fill="#999">Messages</text>
  <text x="305" y="255" text-anchor="middle" font-size="10" fill="#999">Drafts</text>
  <text x="305" y="270" text-anchor="middle" font-size="10" fill="#999">Knowledge</text>

  <!-- Arrow: Customer -> API -->
  <line x1="170" y1="220" x2="225" y2="220" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- AI Service -->
  <rect x="440" y="70" width="150" height="100" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">OpenAI API</text>
  <text x="515" y="125" text-anchor="middle" font-size="11" fill="#666">GPT-4o-mini</text>
  <text x="515" y="145" text-anchor="middle" font-size="10" fill="#999">Draft Generatie</text>

  <!-- RAG -->
  <rect x="440" y="200" width="150" height="100" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="235" text-anchor="middle" font-size="13" font-weight="600" fill="#e65100">ChromaDB</text>
  <text x="515" y="255" text-anchor="middle" font-size="11" fill="#666">Vector Store</text>
  <text x="515" y="275" text-anchor="middle" font-size="10" fill="#999">RAG Pipeline</text>

  <!-- Database -->
  <rect x="440" y="330" width="150" height="100" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#c2185b">SQLite</text>
  <text x="515" y="385" text-anchor="middle" font-size="11" fill="#666">Database</text>
  <text x="515" y="405" text-anchor="middle" font-size="10" fill="#999">Gesprekken &amp; Drafts</text>

  <!-- Dashboard -->
  <rect x="640" y="180" width="140" height="80" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#7b1fa2">Dashboard</text>
  <text x="710" y="240" text-anchor="middle" font-size="11" fill="#666">Jinja2 Templates</text>

  <!-- Arrows: API -> Services -->
  <line x1="380" y1="195" x2="435" y2="140" stroke="#4caf50" stroke-width="2"/>
  <line x1="380" y1="230" x2="435" y2="240" stroke="#ff9800" stroke-width="2"/>
  <line x1="380" y1="260" x2="435" y2="360" stroke="#e91e63" stroke-width="2"/>

  <!-- Arrow: API -> Dashboard -->
  <line x1="380" y1="220" x2="635" y2="220" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Knowledge Base -->
  <rect x="230" y="380" width="150" height="80" rx="10" fill="#e0f2f1" stroke="#009688" stroke-width="2" filter="url(#shadow)"/>
  <text x="305" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#00695c">Kennisbank</text>
  <text x="305" y="435" text-anchor="middle" font-size="10" fill="#999">FAQ | Verzend | Retour</text>

  <!-- Arrow: Knowledge -> ChromaDB -->
  <line x1="380" y1="410" x2="435" y2="280" stroke="#009688" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Agent -->
  <rect x="640" y="310" width="140" height="80" rx="10" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#283593">Medewerker</text>
  <text x="710" y="370" text-anchor="middle" font-size="11" fill="#666">Review &amp; Goedkeuring</text>

  <!-- Arrow: Dashboard -> Agent -->
  <line x1="710" y1="260" x2="710" y2="305" stroke="#3f51b5" stroke-width="2"/>
</svg>
