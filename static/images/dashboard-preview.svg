<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Segoe UI, sans-serif">
  <!-- Browser Chrome -->
  <rect width="900" height="600" rx="8" fill="#e0e0e0"/>
  <rect x="0" y="0" width="900" height="40" rx="8" fill="#dee2e6"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <rect x="100" y="10" width="300" height="20" rx="10" fill="#fff"/>
  <text x="250" y="25" text-anchor="middle" font-size="10" fill="#999">localhost:8000/dashboard</text>

  <!-- Header -->
  <rect x="0" y="40" width="900" height="55" fill="#1a73e8"/>
  <text x="30" y="72" font-size="16" font-weight="bold" fill="#fff">AI Klantenservice Assistent</text>
  <text x="30" y="88" font-size="11" fill="rgba(255,255,255,0.8)">Dashboard</text>
  <text x="120" y="88" font-size="11" fill="rgba(255,255,255,0.8)">Te Beoordelen</text>
  <text x="230" y="88" font-size="11" fill="rgba(255,255,255,0.8)">Opgelost</text>

  <!-- Stats Cards -->
  <rect x="20" y="110" width="200" height="70" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <rect x="20" y="110" width="4" height="70" rx="2" fill="#1a73e8"/>
  <text x="40" y="140" font-size="24" font-weight="bold" fill="#1a73e8">12</text>
  <text x="40" y="165" font-size="11" fill="#999">TOTAAL</text>

  <rect x="235" y="110" width="200" height="70" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <rect x="235" y="110" width="4" height="70" rx="2" fill="#ff9800"/>
  <text x="255" y="140" font-size="24" font-weight="bold" fill="#1a73e8">5</text>
  <text x="255" y="165" font-size="11" fill="#999">OPEN</text>

  <rect x="450" y="110" width="200" height="70" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <rect x="450" y="110" width="4" height="70" rx="2" fill="#2196f3"/>
  <text x="470" y="140" font-size="24" font-weight="bold" fill="#1a73e8">3</text>
  <text x="470" y="165" font-size="11" fill="#999">IN BEHANDELING</text>

  <rect x="665" y="110" width="215" height="70" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <rect x="665" y="110" width="4" height="70" rx="2" fill="#4caf50"/>
  <text x="685" y="140" font-size="24" font-weight="bold" fill="#1a73e8">4</text>
  <text x="685" y="165" font-size="11" fill="#999">OPGELOST</text>

  <!-- Filter bar -->
  <rect x="20" y="200" width="50" height="26" rx="13" fill="#1a73e8"/>
  <text x="45" y="218" text-anchor="middle" font-size="11" fill="#fff">Alle</text>
  <rect x="80" y="200" width="55" height="26" rx="13" fill="#fff" stroke="#ddd"/>
  <text x="107" y="218" text-anchor="middle" font-size="11" fill="#555">Open</text>
  <rect x="145" y="200" width="100" height="26" rx="13" fill="#fff" stroke="#ddd"/>
  <text x="195" y="218" text-anchor="middle" font-size="11" fill="#555">In Behandeling</text>
  <rect x="255" y="200" width="70" height="26" rx="13" fill="#fff" stroke="#ddd"/>
  <text x="290" y="218" text-anchor="middle" font-size="11" fill="#555">Opgelost</text>

  <!-- Conversation Cards -->
  <rect x="20" y="245" width="860" height="95" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <rect x="20" y="245" width="4" height="95" rx="2" fill="#ff9800"/>
  <text x="40" y="275" font-size="14" font-weight="600" fill="#222">Bestelling niet ontvangen - Order #12847</text>
  <rect x="780" y="260" width="70" height="22" rx="11" fill="#fff3e0"/>
  <text x="815" y="276" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">OPEN</text>
  <text x="40" y="300" font-size="11" fill="#666">Jan de Vries</text>
  <text x="160" y="300" font-size="11" fill="#666">jan.devries@email.nl</text>
  <text x="350" y="300" font-size="11" fill="#666">20-09-2025 14:23</text>
  <text x="40" y="325" font-size="12" fill="#888">Goedemiddag, ik heb op 15 september een bestelling geplaatst maar ik heb deze nog steeds niet...</text>

  <rect x="20" y="355" width="860" height="95" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <rect x="20" y="355" width="4" height="95" rx="2" fill="#2196f3"/>
  <text x="40" y="385" font-size="14" font-weight="600" fill="#222">Retour aanvragen - Verkeerde maat ontvangen</text>
  <rect x="745" y="370" width="105" height="22" rx="11" fill="#e3f2fd"/>
  <text x="797" y="386" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">IN BEHANDELING</text>
  <text x="40" y="410" font-size="11" fill="#666">Maria Jansen</text>
  <text x="160" y="410" font-size="11" fill="#666">m.jansen@outlook.nl</text>
  <text x="350" y="410" font-size="11" fill="#666">18-09-2025 09:15</text>
  <text x="40" y="435" font-size="12" fill="#888">Dank u wel voor de snelle reactie! Ik heb het retourlabel ontvangen. Ik lever het pakket morgen...</text>

  <rect x="20" y="465" width="860" height="95" rx="8" fill="#fff" stroke="#e0e0e0"/>
  <rect x="20" y="465" width="4" height="95" rx="2" fill="#4caf50"/>
  <text x="40" y="495" font-size="14" font-weight="600" fill="#222">Vraag over verzendkosten naar België</text>
  <rect x="775" y="480" width="75" height="22" rx="11" fill="#e8f5e9"/>
  <text x="812" y="496" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">OPGELOST</text>
  <text x="40" y="520" font-size="11" fill="#666">Sophie Bakker</text>
  <text x="160" y="520" font-size="11" fill="#666">sophie.b@hotmail.nl</text>
  <text x="350" y="520" font-size="11" fill="#666">15-09-2025 11:42</text>
  <text x="40" y="545" font-size="12" fill="#888">Hoi, ik woon in België en wil graag een bestelling plaatsen. Wat zijn de verzendkosten...</text>
</svg>
